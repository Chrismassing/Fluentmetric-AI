<template>
    <article class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="standard:dashboard" size="small" alternative-text="Tableau Next"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">{title}</h2>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">
            <p class="slds-text-body_regular slds-m-bottom_small">{subtitle}</p>
            <template lwc:if={ready}>
                <lightning-button
                    variant="brand"
                    icon-name="utility:new_window"
                    icon-position="right"
                    label={target.workspaceLabel}
                    title={target.workspaceLabel}
                    onclick={handleOpen}>
                </lightning-button>
            </template>
            <template lwc:if={errorMessage}>
                <p class="slds-text-color_error slds-text-body_small">{errorMessage}</p>
            </template>
        </div>
    </article>
</template>
