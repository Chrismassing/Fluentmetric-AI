<template>
    <div class="fm-app-shell" onopeninexplorer={handleOpenInExplorer}>
        <!--
            Compact sticky toolbar.
              • Single row: app icon + title on the left, date-range pill on
                the right showing preset + resolved dates.
              • Sits above the tabset at z-index 4 so it stays in view as
                users scroll long pages.
              • The old two-row header + "FluentMetric AI / See who uses
                Einstein…" copy moved to a helptext on the title to reclaim
                vertical space without losing the framing.
        -->
        <header class="fm-app-toolbar slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-p-horizontal_medium slds-p-vertical_x-small">
            <div class="slds-grid slds-grid_vertical-align-center fm-app-toolbar__title">
                <lightning-icon
                    icon-name="custom:custom17"
                    size="small"
                    alternative-text="FluentMetric AI"
                    class="slds-m-right_small">
                </lightning-icon>
                <h1 class="slds-text-heading_medium">{labels.appTitle}</h1>
                <lightning-helptext
                    content={labels.appSubtitle}
                    class="slds-m-left_x-small">
                </lightning-helptext>
            </div>
            <div class="fm-app-toolbar__date">
                <c-ai-insights-date-filter></c-ai-insights-date-filter>
            </div>
        </header>

        <!-- Active filter pills — globally visible so users see what is
             slicing the view from any tab, not just Explorer. The pills
             component renders nothing when no filter is active so the
             toolbar collapses to a single row when there are no filters. -->
        <div class="slds-p-horizontal_medium slds-p-bottom_x-small">
            <c-ai-insights-filter-pills></c-ai-insights-filter-pills>
        </div>

        <!--
            Five-tab navigation: Overview · Adoption · Explorer · Safety · Cost.
            All tabs stay mounted (no lazy loading) so each child's LMS
            subscriber connects during its own connectedCallback — this
            matters because the date-filter publish can race an unmounted
            child and leave it with null dates.
        -->
        <div class="slds-card fm-app-tabs slds-m-horizontal_medium slds-m-bottom_medium">
            <lightning-tabset variant="standard" class="fm-tabset" active-tab-value={activeTab}>
                <lightning-tab
                    value="overview"
                    label={labels.tabOverview}
                    icon-name="utility:dashboard"
                    title={tooltips.tabOverview}>
                    <div class="slds-p-around_medium">
                        <c-ai-insights-overview></c-ai-insights-overview>
                    </div>
                </lightning-tab>

                <lightning-tab
                    value="adoption"
                    label={labels.tabAdoption}
                    icon-name="utility:trending"
                    title={tooltips.tabAdoption}>
                    <div class="slds-p-around_medium">
                        <c-ai-insights-adoption></c-ai-insights-adoption>
                    </div>
                </lightning-tab>

                <!-- Explorer: rail + pivot in a two-column layout inside the tab. -->
                <lightning-tab
                    value="explorer"
                    label={labels.tabExplorer}
                    icon-name="utility:search"
                    title={tooltips.tabExplorer}>
                    <div class="slds-grid slds-gutters_small slds-wrap slds-p-top_small">
                        <main class={mainColumnClass}>
                            <c-ai-insights-explorer></c-ai-insights-explorer>
                        </main>
                        <aside class={railColumnClass}>
                            <div class="slds-box slds-box_x-small slds-theme_default">
                                <c-ai-insights-filter-rail
                                    onrailtoggle={handleRailToggle}>
                                </c-ai-insights-filter-rail>
                            </div>
                        </aside>
                    </div>
                </lightning-tab>

                <lightning-tab
                    value="safety"
                    label={labels.tabSafety}
                    icon-name="utility:shield"
                    title={tooltips.tabSafety}>
                    <div class="slds-p-around_medium">
                        <c-ai-insights-safety></c-ai-insights-safety>
                    </div>
                </lightning-tab>

                <lightning-tab
                    value="cost"
                    label={labels.tabCost}
                    icon-name="utility:money"
                    title={tooltips.tabCost}>
                    <div class="slds-p-around_medium">
                        <c-ai-insights-cost></c-ai-insights-cost>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </div>
    </div>
</template>
