<template>
    <template lwc:if={isOpen}>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby={ariaLabelledById}
            class="slds-modal slds-fade-in-open slds-modal_large fm-details-modal"
            onclick={handleModalClick}>
            <div class="slds-modal__container fm-details-container">
                <!-- ─── Header ──────────────────────────────────────────── -->
                <header class="slds-modal__header fm-modal-header">
                    <button
                        type="button"
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse fm-modal-close-btn"
                        aria-label="Close dialog"
                        title={modalTooltips.close}
                        autofocus
                        onclick={handleClose}>
                        <lightning-icon
                            icon-name="utility:close"
                            size="small"
                            variant="inverse"
                            alternative-text="Close">
                        </lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="fm-details-modal-heading" class="slds-modal__title slds-hyphenate">
                        {modalTitle}
                        <lightning-helptext content={tooltips.modalHeader} class="slds-m-left_x-small"></lightning-helptext>
                    </h2>
                    <template lwc:if={showRawKey}>
                        <p class="fm-modal-subtitle">
                            <span class="slds-text-title_caps slds-text-color_weak">Key</span>
                            <span class="slds-m-left_xx-small slds-text-body_small">{entityKey}</span>
                            <lightning-helptext content={tooltips.entityKey} class="slds-m-left_xx-small"></lightning-helptext>
                        </p>
                    </template>
                </header>

                <!-- ─── Body ────────────────────────────────────────────── -->
                <div class="slds-modal__content slds-p-around_medium fm-modal-body">
                    <template lwc:if={isLoading}>
                        <div class="fm-spinner-wrap" role="status">
                            <lightning-spinner
                                alternative-text="Loading entity details"
                                size="medium"
                                variant="brand">
                            </lightning-spinner>
                        </div>
                    </template>

                    <template lwc:if={showError}>
                        <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                            <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" alternative-text="Error"></lightning-icon>
                            <span class="slds-m-left_x-small">{errorMessage}</span>
                        </div>
                    </template>

                    <template lwc:if={showBody}>
                        <!-- ─── Stats strip ─────────────────────────────── -->
                        <section class="fm-stats-strip" aria-label="Entity statistics">
                            <div class="fm-stat-tile">
                                <p class="fm-stat-tile__label">
                                    Requests
                                    <lightning-helptext content={tooltips.requestCount}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value">{requestCountDisplay}</p>
                            </div>

                            <div class="fm-stat-tile">
                                <p class="fm-stat-tile__label">
                                    Total tokens
                                    <lightning-helptext content={tooltips.totalTokens}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value">{totalTokensDisplay}</p>
                            </div>

                            <div class="fm-stat-tile">
                                <p class="fm-stat-tile__label">
                                    Avg tokens/req
                                    <lightning-helptext content={tooltips.avgTokensPerRequest}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value">{avgTokensDisplay}</p>
                            </div>

                            <div class="fm-stat-tile">
                                <p class="fm-stat-tile__label">
                                    First used
                                    <lightning-helptext content={tooltips.firstUsed}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value" title={firstUsedTitle}>{firstUsedDisplay}</p>
                            </div>

                            <div class="fm-stat-tile">
                                <p class="fm-stat-tile__label">
                                    Last used
                                    <lightning-helptext content={tooltips.lastUsed}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value" title={lastUsedTitle}>{lastUsedDisplay}</p>
                            </div>

                            <div class={acceptanceTileClass}>
                                <p class="fm-stat-tile__label">
                                    Acceptance
                                    <lightning-helptext content={tooltips.acceptanceRate}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value">{acceptanceDisplay}</p>
                            </div>

                            <div class={toxicFlagTileClass}>
                                <p class="fm-stat-tile__label">
                                    Safety flags
                                    <lightning-helptext content={tooltips.toxicFlagCount}></lightning-helptext>
                                </p>
                                <p class="fm-stat-tile__value">{toxicFlagDisplay}</p>
                            </div>

                            <template lwc:if={showUniqueUsersTile}>
                                <div class="fm-stat-tile">
                                    <p class="fm-stat-tile__label">
                                        Unique users
                                        <lightning-helptext content={tooltips.uniqueUserCount}></lightning-helptext>
                                    </p>
                                    <p class="fm-stat-tile__value">{uniqueUserDisplay}</p>
                                </div>
                            </template>

                            <template lwc:if={showUniquePromptsTile}>
                                <div class="fm-stat-tile">
                                    <p class="fm-stat-tile__label">
                                        Unique prompts
                                        <lightning-helptext content={tooltips.uniquePromptCount}></lightning-helptext>
                                    </p>
                                    <p class="fm-stat-tile__value">{uniquePromptDisplay}</p>
                                </div>
                            </template>
                        </section>

                        <!-- ─── Recent requests ────────────────────────── -->
                        <section class="slds-m-top_medium" aria-label="Recent requests">
                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                <h3 class="slds-text-heading_small">Recent Requests</h3>
                                <template lwc:if={recentRequestCountLabel}>
                                    <span class="slds-text-body_small slds-text-color_weak">{recentRequestCountLabel}</span>
                                </template>
                            </div>

                            <template lwc:if={hasRecentRequests}>
                                <lightning-accordion
                                    allow-multiple-sections-open
                                    active-section-name={activeSections}
                                    onsectiontoggle={handleAccordionToggle}>
                                    <template for:each={recentRequests} for:item="row">
                                        <lightning-accordion-section
                                            key={row.sectionName}
                                            name={row.sectionName}
                                            label={row.sectionLabel}>
                                            <div class="fm-output-card">
                                                <!-- Row header -->
                                                <div class="slds-grid slds-grid_align-spread slds-wrap slds-m-bottom_small">
                                                    <div class="slds-grid slds-grid_vertical-align-center slds-wrap">
                                                        <div class="fm-output-field slds-m-right_medium">
                                                            <span class="fm-output-label">
                                                                User
                                                                <lightning-helptext content={outputTooltips.userName}></lightning-helptext>
                                                            </span>
                                                            <span class="fm-output-value">{row.userName}</span>
                                                        </div>
                                                        <div class="fm-output-field slds-m-right_medium">
                                                            <span class="fm-output-label">
                                                                Date
                                                                <lightning-helptext content={outputTooltips.requestDate}></lightning-helptext>
                                                            </span>
                                                            <span class="fm-output-value">
                                                                <lightning-formatted-date-time
                                                                    value={row.requestDate}
                                                                    year="numeric"
                                                                    month="short"
                                                                    day="2-digit"
                                                                    hour="2-digit"
                                                                    minute="2-digit">
                                                                </lightning-formatted-date-time>
                                                            </span>
                                                        </div>
                                                        <div class="fm-output-field slds-m-right_medium">
                                                            <span class="fm-output-label">
                                                                Model
                                                                <lightning-helptext content={outputTooltips.model}></lightning-helptext>
                                                            </span>
                                                            <span class="fm-output-value">{row.model}</span>
                                                        </div>
                                                        <div class="fm-output-field">
                                                            <span class="fm-output-label">
                                                                Feedback
                                                                <lightning-helptext content={outputTooltips.feedbackValue}></lightning-helptext>
                                                            </span>
                                                            <span class={row.feedbackBadgeClass}>
                                                                <lightning-icon icon-name={row.feedbackIcon} size="xx-small" alternative-text={row.feedbackLabel}></lightning-icon>
                                                                <span class="slds-m-left_xx-small">{row.feedbackLabel}</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <!-- Input prompt -->
                                                <div class="fm-output-field slds-m-bottom_small">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_xx-small">
                                                        <span class="fm-output-label">
                                                            Input prompt
                                                            <lightning-helptext content={outputTooltips.inputPrompt}></lightning-helptext>
                                                        </span>
                                                        <lightning-button
                                                            label="Expand"
                                                            variant="base"
                                                            icon-name="utility:expand_alt"
                                                            icon-position="left"
                                                            data-field="input"
                                                            data-request-id={row.requestId}
                                                            title={modalTooltips.expandInput}
                                                            onclick={handleExpandText}>
                                                        </lightning-button>
                                                    </div>
                                                    <pre class="fm-output-text">{row.inputPromptCollapsed}</pre>
                                                </div>

                                                <!-- Output -->
                                                <div class="fm-output-field slds-m-bottom_small">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_xx-small">
                                                        <span class="fm-output-label">
                                                            Generated output
                                                            <lightning-helptext content={outputTooltips.generatedText}></lightning-helptext>
                                                        </span>
                                                        <lightning-button
                                                            label="Expand"
                                                            variant="base"
                                                            icon-name="utility:expand_alt"
                                                            icon-position="left"
                                                            data-field="output"
                                                            data-request-id={row.requestId}
                                                            title={modalTooltips.expandOutput}
                                                            onclick={handleExpandText}>
                                                        </lightning-button>
                                                    </div>
                                                    <pre class="fm-output-text">{row.generatedTextCollapsed}</pre>
                                                </div>

                                                <!-- Footer strip: tokens + safety -->
                                                <div class="slds-grid slds-wrap slds-box slds-box_xx-small slds-theme_shade">
                                                    <div class="fm-output-field slds-m-right_medium">
                                                        <span class="fm-output-label">
                                                            Input tokens
                                                            <lightning-helptext content={outputTooltips.inputTokens}></lightning-helptext>
                                                        </span>
                                                        <span class="fm-output-value">{row.inputTokensDisplay}</span>
                                                    </div>
                                                    <div class="fm-output-field slds-m-right_medium">
                                                        <span class="fm-output-label">
                                                            Output tokens
                                                            <lightning-helptext content={outputTooltips.outputTokens}></lightning-helptext>
                                                        </span>
                                                        <span class="fm-output-value">{row.outputTokensDisplay}</span>
                                                    </div>
                                                    <template lwc:if={row.isToxic}>
                                                        <div class="fm-output-field">
                                                            <span class="fm-output-label">
                                                                Safety
                                                                <lightning-helptext content={outputTooltips.isToxic}></lightning-helptext>
                                                            </span>
                                                            <span class={row.safetyFlagClass}>
                                                                <lightning-icon icon-name="utility:warning" size="xx-small" alternative-text="Flagged" variant="error"></lightning-icon>
                                                                <span class="slds-m-left_xx-small">Flagged</span>
                                                            </span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </lightning-accordion-section>
                                    </template>
                                </lightning-accordion>
                            </template>

                            <template lwc:if={hasNoRecentRequests}>
                                <div class="slds-box slds-theme_shade slds-text-body_small slds-text-color_weak" role="status">
                                    <p>No recent requests in the selected range for this entity.</p>
                                </div>
                            </template>
                        </section>
                    </template>
                </div>

                <!-- ─── Footer ──────────────────────────────────────────── -->
                <footer class="slds-modal__footer">
                    <lightning-button
                        variant="brand"
                        label="Close"
                        title={modalTooltips.close}
                        onclick={handleClose}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div
            class="slds-backdrop slds-backdrop_open"
            data-role="backdrop"
            onclick={handleBackdropClick}>
        </div>

        <!-- Nested expand-full-text modal. Reused from aiInsightsTextModal. -->
        <c-ai-insights-text-modal></c-ai-insights-text-modal>
    </template>
</template>
