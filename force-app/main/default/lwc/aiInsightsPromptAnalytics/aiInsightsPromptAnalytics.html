<template>
    <lightning-card title="Prompt Analytics" icon-name="standard:prompt_template">
        <template lwc:if={resultSummary}>
            <span slot="actions" class="slds-text-body_small slds-text-color_weak">{resultSummary}</span>
        </template>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <div class="slds-m-bottom_small">
                <lightning-input
                    type="search"
                    label="Search prompts"
                    variant="label-hidden"
                    placeholder="Filter by prompt label or feature..."
                    value={searchTerm}
                    onchange={handleSearch}>
                </lightning-input>
            </div>

            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">
                Click a prompt template name to view its outputs below.
            </p>

            <template lwc:if={showError}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="inverse" alternative-text="Error"></lightning-icon>
                    <span class="slds-m-left_x-small">{errorMessage}</span>
                </div>
            </template>

            <template lwc:if={isLoading}>
                <div class="fm-spinner-wrap" role="status">
                    <lightning-spinner alternative-text="Loading prompt analytics" size="medium" variant="brand"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={showEmptyState}>
                <c-ai-insights-empty-state
                    title={labels.emptyTitle}
                    message={labels.emptyMessage}
                    icon-name="standard:prompt_template"
                    primary-action-label={labels.expandRange}
                    onprimaryaction={handleExpandRange}>
                </c-ai-insights-empty-state>
            </template>

            <template lwc:if={showNoMatches}>
                <c-ai-insights-empty-state
                    title="No matches"
                    message="No prompts match the current search. Try clearing the filter."
                    icon-name="utility:search">
                </c-ai-insights-empty-state>
            </template>

            <template lwc:if={showTable}>
                <template lwc:if={hasData}>
                    <div class="fm-datatable" role="region" aria-label="Prompt analytics table">
                        <lightning-datatable
                            key-field="promptDevName"
                            data={visibleRows}
                            columns={columns}
                            sorted-by={sortedBy}
                            sorted-direction={sortedDirection}
                            onsort={handleSort}
                            onrowaction={handleRowAction}
                            hide-checkbox-column
                            column-widths-mode="auto">
                        </lightning-datatable>
                    </div>

                    <template lwc:if={showLoadMore}>
                        <div class="slds-text-align_center slds-m-top_small">
                            <lightning-button
                                label="Load more"
                                icon-name="utility:down"
                                icon-position="right"
                                onclick={handleLoadMore}>
                            </lightning-button>
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>

    <!-- Entity drill side-sheet — opened when a Prompt Template button cell is clicked -->
    <c-ai-insights-drill-panel></c-ai-insights-drill-panel>
</template>
