<template>
    <div class="slds-grid slds-grid_vertical-align-end slds-gutters_x-small slds-wrap" role="group" aria-label="Date range filter">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-large-size_3-of-12">
            <lightning-combobox
                name="preset"
                label="Date range"
                value={preset}
                options={presetOptions}
                onchange={handlePresetChange}
                variant="label-stacked">
            </lightning-combobox>
        </div>
        <template lwc:if={isCustom}>
            <div class="slds-col slds-size_1-of-2 slds-medium-size_3-of-12 slds-large-size_2-of-12">
                <lightning-input
                    type="date"
                    name="customStart"
                    label="From"
                    value={customStart}
                    onchange={handleCustomStartChange}
                    variant="label-stacked">
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-2 slds-medium-size_3-of-12 slds-large-size_2-of-12">
                <lightning-input
                    type="date"
                    name="customEnd"
                    label="To"
                    value={customEnd}
                    onchange={handleCustomEndChange}
                    variant="label-stacked">
                </lightning-input>
            </div>
        </template>
    </div>
    <template lwc:if={errorMessage}>
        <div class="slds-text-color_error slds-text-body_small slds-m-top_x-small" role="alert">
            {errorMessage}
        </div>
    </template>
</template>
